name: Caddyfile SDK

on:
  push:
    paths:
      - apps/caddyfile-sdk/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - turbo.json
  pull_request:
    paths:
      - apps/caddyfile-sdk/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - turbo.json

jobs:
  caddyfile-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Lint
        run: npm run lint
        env:
          TURBO_FILTER: ./apps/caddyfile-sdk

      - name: Test
        run: npm run test
        env:
          TURBO_FILTER: ./apps/caddyfile-sdk

      - name: Build
        run: npm run build --ignore-scripts
        env:
          TURBO_FILTER: ./apps/caddyfile-sdk
