name: Caddyfile SDK

on:
  push:
    paths:
      - apps/caddyfile-sdk/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - turbo.json
  pull_request:
    paths:
      - apps/caddyfile-sdk/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - turbo.json

jobs:
  caddyfile-sdk-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci -ws --include-workspace-root

      - name: Lint
        run: npm run lint -w @arylo/caddyfile-sdk

      - name: Test
        run: npm run test -w @arylo/caddyfile-sdk

      - name: Build
        run: npm run build -w @arylo/caddyfile-sdk
